set -g default-terminal "xterm-256color"
set -g clock-mode-colour colour220
set -g display-panes-active-colour colour220
set -g display-panes-colour colour239

# set default shell to zsh
set -g default-command /bin/zsh
set -g default-shell /bin/zsh

set-window-option -g mode-keys vi

# change prefix
set -g prefix C-e
unbind-key C-b
bind-key C-e send-prefix

# action key
set-option -g repeat-time 0

# split panes using | and -
bind \\ split-window -h
bind - split-window -v
unbind '"'
unbind %

# Reload settings
bind r source-file ~/.tmux.conf \; display "Reloaded!"
# Open current directory
bind o run-shell "open #{pane_current_path}"
bind -r e kill-pane -a

# vim-like pane switching
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Resizing pane
bind -r C-k resize-pane -U 5
bind -r C-j resize-pane -D 5
bind -r C-h resize-pane -L 5
bind -r C-l resize-pane -R 5

# base settings
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1

# 允許 OSC escape sequence 穿透 tmux 傳到外層終端機（cmux 通知需要）
set -g allow-passthrough on

# color
# default statusbar colors
set-option -g status-style bg=colour235,fg=colour136,default

# default window title colors
set-window-option -g window-status-style fg=colour244,bg=colour234,dim

# active window title colors
set-window-option -g window-status-current-style fg=colour166,bg=default,bright

# pane border
set-option -g pane-border-style fg=colour250
set-option -g pane-active-border-style fg=colour220,bg=colour235

# message text
set-option -g message-style bg=colour235,fg=colour166

# pane number display
set-option -g display-panes-active-colour colour33
set-option -g display-panes-colour colour166

# clock
set-window-option -g clock-mode-colour colour64

# status bar
# ===== Base =====
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=colour234,fg=colour252"
set -g status-left-length 40
set -g status-right-length 160
set -g status-interval 5

# ===== Message / mode =====
set -g message-style "bg=colour220,fg=colour234"
set -g mode-style "bg=colour220,fg=colour234,bold"

# ===== Left =====
set -g status-left "#[fg=colour234,bg=colour220,bold] #S #[fg=colour220,bg=colour238]#[fg=colour255,bg=colour238] #(whoami) #[fg=colour238,bg=colour234]"

# ===== Right =====
set -g status-right "#[fg=colour238,bg=colour234]#[fg=colour255,bg=colour238] CPU #(top -l 2 -n 0 | awk '/CPU usage/ {u=\$3; s=\$5} END {gsub(\"%\", \"\", u); gsub(\"%\", \"\", s); printf \"%.0f%%\", u+s}') #[fg=colour220,bg=colour238]#[fg=colour234,bg=colour220,bold] RAM #(memory_pressure | awk '/System-wide memory free percentage/ {gsub(/%/, \"\", \$5); printf \"%d%%\", 100-\$5}') #[fg=colour239,bg=colour220]#[fg=colour255,bg=colour239,bold] %H:%M "

# ===== Windows =====
set -g window-status-separator ""
set -g window-status-style "fg=colour245,bg=colour234"
set -g window-status-format "#[fg=colour240,bg=colour234] #[fg=colour250]#I #[fg=colour245]#W "
set -g window-status-current-style "fg=colour234,bg=colour220,bold"
set -g window-status-current-format "#[fg=colour220,bg=colour234]#[fg=colour234,bg=colour220,bold] #I #[fg=colour234,bg=colour220]#W #[fg=colour220,bg=colour234]"

# ===== Pane =====
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour220"

# ===== Extras =====
set -g clock-mode-colour colour220
set -g display-panes-active-colour colour220
set -g display-panes-colour colour239
